[package]
name = "relay-agent-desktop"
version = "0.1.2"
edition = "2021"
default-run = "relay-agent-desktop"

[lib]
name = "relay_agent_desktop_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2.0.0", features = [] }

[dependencies]
calamine = "0.34.0"
chrono = { version = "0.4", features = ["clock"] }
csv = "1.4.0"
encoding_rs = "0.8"
lopdf = "0.34"
quick-xml = "0.36"
regex = "1"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tauri = { version = "2.0.0", features = [] }
tauri-plugin-shell = "2.0.0"
trash = "5"
uuid = { version = "1.18.1", features = ["v4"] }
zip = "2"
