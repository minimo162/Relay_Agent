name: release-windows-installer

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to publish, for example v0.2.0-aionui.1"
        required: true
        type: string
      release_name:
        description: "Optional GitHub Release name override"
        required: false
        type: string
      self_signed_prerelease:
        description: "When Trusted Signing is absent, publish a self-signed internal prerelease installer instead of unsigned."
        required: false
        default: true
        type: boolean

jobs:
  publish-aionui-windows-installer:
    runs-on: windows-latest
    permissions:
      contents: write
      id-token: write
    env:
      AIONUI_REPOSITORY: https://github.com/iOfficeAI/AionUi
      AIONUI_TAG: v1.9.25
      AIONUI_COMMIT: bbada2a9268060d2b41ddf1d885a9b27ecd2103d
      AZURE_CODESIGN_ENDPOINT: ${{ vars.AZURE_CODESIGN_ENDPOINT }}
      AZURE_CODESIGN_ACCOUNT_NAME: ${{ vars.AZURE_CODESIGN_ACCOUNT_NAME }}
      AZURE_CODESIGN_CERT_PROFILE_NAME: ${{ vars.AZURE_CODESIGN_CERT_PROFILE_NAME }}

    steps:
      - name: Check out Relay repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Resolve release metadata
        id: release_meta
        shell: bash
        run: |
          tag="${{ inputs.release_tag }}"
          release_name="${{ inputs.release_name }}"

          if [ -z "$tag" ]; then
            echo "Release tag is required." >&2
            exit 1
          fi

          if [ -z "$release_name" ]; then
            release_name="Relay Agent ${tag}"
          fi

          printf 'tag=%s\n' "$tag" >> "$GITHUB_OUTPUT"
          printf 'release_name=%s\n' "$release_name" >> "$GITHUB_OUTPUT"

      - name: Resolve Trusted Signing mode
        id: signing_mode
        shell: bash
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          required=(
            AZURE_CLIENT_ID
            AZURE_TENANT_ID
            AZURE_SUBSCRIPTION_ID
            AZURE_CODESIGN_ENDPOINT
            AZURE_CODESIGN_ACCOUNT_NAME
            AZURE_CODESIGN_CERT_PROFILE_NAME
          )

          missing=()
          present=0

          for var_name in "${required[@]}"; do
            if [ -n "${!var_name:-}" ]; then
              present=$((present + 1))
            else
              missing+=("$var_name")
            fi
          done

          if [ "$present" -eq 0 ]; then
            if [[ "${{ steps.release_meta.outputs.tag }}" != *-* ]]; then
              echo "Trusted Signing is required for formal releases. Use a prerelease tag for internal fallback builds." >&2
              exit 1
            fi
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            if [ "${{ inputs.self_signed_prerelease }}" = "true" ]; then
              echo "mode=self-signed-prerelease" >> "$GITHUB_OUTPUT"
              echo "summary=Trusted Signing is not configured; this prerelease will publish a self-signed internal installer asset." >> "$GITHUB_OUTPUT"
            else
              echo "mode=unsigned-prerelease" >> "$GITHUB_OUTPUT"
              echo "summary=Trusted Signing is not configured; this prerelease will publish an unsigned installer asset marked as unsigned." >> "$GITHUB_OUTPUT"
            fi
            exit 0
          fi

          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'Trusted Signing configuration is partial. Missing: %s\n' "${missing[*]}" >&2
            exit 1
          fi

          echo "enabled=true" >> "$GITHUB_OUTPUT"
          echo "mode=trusted-signing" >> "$GITHUB_OUTPUT"
          echo "summary=Trusted Signing is configured, so the workflow will sign the installer before upload." >> "$GITHUB_OUTPUT"

      - name: Check overlay scripts
        run: |
          node --check scripts/apply-aionui-overlay.mjs
          node --test scripts/apply-aionui-overlay.test.mjs

      - name: Check out pinned AionUi
        shell: bash
        run: |
          git clone --branch "$AIONUI_TAG" --depth 1 "$AIONUI_REPOSITORY" aionui
          actual_commit="$(git -C aionui rev-parse HEAD)"
          if [ "$actual_commit" != "$AIONUI_COMMIT" ]; then
            echo "AionUi baseline drift: expected $AIONUI_COMMIT, got $actual_commit" >&2
            exit 1
          fi

      - name: Install AionUi dependencies
        working-directory: aionui
        run: bun install --frozen-lockfile

      - name: Fetch bundled ripgrep for Relay search
        env:
          TAURI_ENV_TARGET_TRIPLE: x86_64-pc-windows-msvc
        run: node apps/desktop/scripts/fetch-bundled-ripgrep.mjs

      - name: Fetch bundled Node for Relay PDF search
        env:
          TAURI_ENV_TARGET_TRIPLE: x86_64-pc-windows-msvc
        run: node apps/desktop/scripts/fetch-bundled-node.mjs

      - name: Prepare LiteParse runner for Relay PDF search
        run: npm ci --omit=dev --prefix apps/desktop/src-tauri/liteparse-runner

      - name: Apply Relay overlay
        run: node scripts/apply-aionui-overlay.mjs --aionui-dir aionui

      - name: Validate Relay overlay
        shell: pwsh
        run: |
          $package = Get-Content -LiteralPath "aionui\package.json" -Raw | ConvertFrom-Json
          if ($package.name -ne "relay-agent-aionui") {
            throw "Relay overlay did not update package name; got '$($package.name)'."
          }
          if ($package.productName -ne "Relay Agent") {
            throw "Relay overlay did not update productName; got '$($package.productName)'."
          }

          $builderConfig = Get-Content -LiteralPath "aionui\electron-builder.yml" -Raw
          if ($builderConfig -notmatch "(?m)^productName:\s+Relay Agent$") {
            throw "Relay overlay did not update electron-builder productName."
          }
          if ($builderConfig -notmatch "(?m)^executableName:\s+Relay Agent$") {
            throw "Relay overlay did not update electron-builder executableName."
          }
          if ($builderConfig -notmatch "resources/relay-gateway") {
            throw "Relay overlay did not bundle the local Copilot gateway resource."
          }
          if ($builderConfig -notmatch "resources/relay-tools") {
            throw "Relay overlay did not bundle Relay-managed portable tools."
          }
          if ($builderConfig -notmatch "out/main/relay-document-search-mcp-stdio\.js") {
            throw "Relay document-search MCP stdio bundle is not marked for asarUnpack."
          }
          $documentSearchMcp = Get-Content -LiteralPath "aionui\src\process\utils\relayDocumentSearchMcpStdio.ts" -Raw
          if ($documentSearchMcp -match "from './relayDocumentSearchBridge'" -or $documentSearchMcp -match "from './relayDocumentSearchSyncProducer'") {
            throw "Relay document-search MCP statically imports search dependencies before tool registration."
          }
          if ($documentSearchMcp -notmatch "import\('\./relayDocumentSearchBridge'\)" -or $documentSearchMcp -notmatch "import\('\./relayDocumentSearchSyncProducer'\)") {
            throw "Relay document-search MCP does not lazy-load search dependencies."
          }

          $gatewayFiles = @(
            "copilot_server.js",
            "copilot_server.mjs",
            "copilot_dom_poll.mjs",
            "copilot_send_timing.mjs",
            "copilot_wait_dom_response.mjs"
          )
          foreach ($gatewayFile in $gatewayFiles) {
            $gatewayPath = Join-Path "aionui\resources\relay-gateway" $gatewayFile
            if (-not (Test-Path -LiteralPath $gatewayPath)) {
              throw "Relay Copilot gateway resource was not copied into AionUi resources: $gatewayFile"
            }
          }
          $copilotGateway = Get-Content -LiteralPath "aionui\resources\relay-gateway\copilot_server.mjs" -Raw
          if ($copilotGateway -notmatch "isMcpQualifiedRelayDocumentSearchToolName") {
            throw "Relay Copilot gateway does not recognize MCP-qualified document-search tool names."
          }
          $ripgrepPath = "aionui\resources\relay-tools\ripgrep\rg.exe"
          if (-not (Test-Path -LiteralPath $ripgrepPath)) {
            throw "Bundled ripgrep was not copied into AionUi resources."
          }
          & $ripgrepPath --version
          $relayNodePath = "aionui\resources\relay-tools\node\relay-node.exe"
          if (-not (Test-Path -LiteralPath $relayNodePath)) {
            throw "Bundled Node was not copied into AionUi resources."
          }
          & $relayNodePath --version
          $liteparseRunnerPath = "aionui\resources\relay-tools\liteparse-runner\parse.mjs"
          if (-not (Test-Path -LiteralPath $liteparseRunnerPath)) {
            throw "LiteParse runner was not copied into AionUi resources."
          }
          $aionCliGlobPath = "aionui\node_modules\@office-ai\aioncli-core\dist\src\tools\glob.js"
          $aionCliRipGrepPath = "aionui\node_modules\@office-ai\aioncli-core\dist\src\tools\ripGrep.js"
          foreach ($searchPatchPath in @($aionCliGlobPath, $aionCliRipGrepPath)) {
            if (-not (Test-Path -LiteralPath $searchPatchPath)) {
              throw "AionCLI shared search patch target was not found: $searchPatchPath"
            }
          }
          $aionCliGlob = Get-Content -LiteralPath $aionCliGlobPath -Raw
          if ($aionCliGlob -notmatch "Relay Agent shared-folder search override" -or $aionCliGlob -notmatch "performRelayRipgrepFileListing" -or $aionCliGlob -notmatch "RELAY_SHARED_SEARCH_PER_BRANCH_LIMIT") {
            throw "Relay overlay did not install the ripgrep-backed shared-folder glob patch."
          }
          $aionCliRipGrep = Get-Content -LiteralPath $aionCliRipGrepPath -Raw
          if ($aionCliRipGrep -notmatch "Relay Agent shared-folder grep override" -or $aionCliRipGrep -notmatch "RELAY_SHARED_SEARCH_NAMES_ONLY_MAX_MATCHES") {
            throw "Relay overlay did not install the shared-folder grep search policy patch."
          }
          if (-not (Test-Path -LiteralPath "aionui\src\process\utils\relayGateway.ts")) {
            throw "Relay gateway startup overlay was not copied into AionUi."
          }
          $index = Get-Content -LiteralPath "aionui\src\index.ts" -Raw
          if ($index -notmatch "startRelayGatewayBeforeShell") {
            throw "Relay gateway startup hook was not installed before AionUi shell startup."
          }

          $titlebar = Get-Content -LiteralPath "aionui\src\renderer\components\layout\Titlebar\index.tsx" -Raw
          if ($titlebar -match "const appTitle = useMemo\(\(\) => 'AionUi'") {
            throw "Relay overlay did not update the visible titlebar app title."
          }
          if ($titlebar -notmatch "RelayLogoMark" -or $titlebar -notmatch "Relay Agent") {
            throw "Relay overlay did not install the Relay titlebar brand mark."
          }

          $layout = Get-Content -LiteralPath "aionui\src\renderer\components\layout\Layout.tsx" -Raw
          if ($layout -match ">AionUi</div>") {
            throw "Relay overlay did not update the visible sidebar brand text."
          }
          if ($layout -notmatch "RelayLogo" -or $layout -notmatch ">Relay Agent</div>") {
            throw "Relay overlay did not install the Relay sidebar logo."
          }

      - name: Build Relay-branded AionUi Windows installer
        working-directory: aionui
        env:
          CI: true
          GH_TOKEN: ${{ github.token }}
          GITHUB_TOKEN: ${{ github.token }}
        run: bun run build-win:x64

      - name: Locate AionUi installer artifact
        id: installer
        shell: pwsh
        run: |
          $installerDir = Join-Path $env:GITHUB_WORKSPACE "aionui\out"
          if (-not (Test-Path $installerDir)) {
            throw "AionUi output directory was not created: $installerDir"
          }

          $candidates = Get-ChildItem -Path $installerDir -Filter "*.exe" -File
          $candidates | ForEach-Object { Write-Host "Installer candidate: $($_.Name)" }

          $installer = $candidates |
            Where-Object { $_.Name -like "Relay Agent-*-win-x64.exe" } |
            Sort-Object LastWriteTimeUtc -Descending |
            Select-Object -First 1

          if (-not $installer) {
            $candidateNames = ($candidates | ForEach-Object { $_.Name }) -join ", "
            throw "No Relay Agent AionUi Windows installer `.exe` was found in $installerDir. Found: $candidateNames"
          }

          "path=$($installer.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "name=$($installer.Name)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Azure login for Trusted Signing
        if: steps.signing_mode.outputs.enabled == 'true'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Sign installer with Trusted Signing
        if: steps.signing_mode.outputs.enabled == 'true'
        uses: azure/artifact-signing-action@v1
        with:
          endpoint: ${{ vars.AZURE_CODESIGN_ENDPOINT }}
          signing-account-name: ${{ vars.AZURE_CODESIGN_ACCOUNT_NAME }}
          certificate-profile-name: ${{ vars.AZURE_CODESIGN_CERT_PROFILE_NAME }}
          files: ${{ steps.installer.outputs.path }}
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256
          description: Relay Agent AionUi Windows installer
          description-url: https://github.com/${{ github.repository }}

      - name: Sign installer with self-signed certificate
        if: steps.signing_mode.outputs.mode == 'self-signed-prerelease'
        id: self_signed
        shell: pwsh
        run: |
          $outputDir = Join-Path $env:RUNNER_TEMP "relay-agent-aionui-self-signed"
          $pfxPassword = "RelayAgentAionUiSelfSignedCi-$env:GITHUB_RUN_ID-$env:GITHUB_RUN_ATTEMPT"
          & .\scripts\windows-self-sign-installer.ps1 `
            -InstallerPath "${{ steps.installer.outputs.path }}" `
            -OutputDirectory $outputDir `
            -Organization "Relay Agent Dev" `
            -CommonName "Relay Agent AionUi GitHub Actions Internal Test" `
            -PfxPassword $pfxPassword `
            -SkipSignToolVerify

          $signedInstaller = Get-ChildItem -Path $outputDir -Filter "*-selfsigned.exe" -File |
            Sort-Object LastWriteTimeUtc -Descending |
            Select-Object -First 1
          if (-not $signedInstaller) {
            throw "Self-signed installer was not created under $outputDir."
          }

          $certificatePath = Join-Path $outputDir "relay-agent-selfsigned.crt"
          if (-not (Test-Path -LiteralPath $certificatePath)) {
            throw "Self-signed public certificate was not created at $certificatePath."
          }

          $certificateAssetPath = Join-Path $outputDir "relay-agent-aionui-selfsigned-public-test-cert.crt"
          Copy-Item -LiteralPath $certificatePath -Destination $certificateAssetPath -Force

          $signature = Get-AuthenticodeSignature $signedInstaller.FullName
          if (-not $signature.SignerCertificate) {
            throw "Expected an Authenticode signer certificate on the self-signed installer, got '$($signature.Status)'."
          }

          "path=$($signedInstaller.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "name=$($signedInstaller.Name)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "cert_path=$certificateAssetPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "cert_name=$([System.IO.Path]::GetFileName($certificateAssetPath))" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "status=$($signature.Status)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "subject=$($signature.SignerCertificate.Subject)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "thumbprint=$($signature.SignerCertificate.Thumbprint)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Verify Authenticode signature
        if: steps.signing_mode.outputs.enabled == 'true'
        id: signature
        shell: pwsh
        run: |
          $signature = Get-AuthenticodeSignature "${{ steps.installer.outputs.path }}"
          if ($signature.Status -ne "Valid") {
            throw "Expected a valid Authenticode signature, got '$($signature.Status)'."
          }

          "status=$($signature.Status)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "subject=$($signature.SignerCertificate.Subject)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "thumbprint=$($signature.SignerCertificate.Thumbprint)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Prepare release asset
        id: release_asset
        shell: pwsh
        run: |
          $path = "${{ steps.installer.outputs.path }}"
          $name = "${{ steps.installer.outputs.name }}"
          $mode = "${{ steps.signing_mode.outputs.mode }}"

          if ($mode -eq "self-signed-prerelease") {
            $path = "${{ steps.self_signed.outputs.path }}"
            $name = "${{ steps.self_signed.outputs.name }}"
          } elseif ("${{ steps.signing_mode.outputs.enabled }}" -ne "true") {
            $dir = Split-Path -Parent $path
            $stem = [System.IO.Path]::GetFileNameWithoutExtension($name)
            $unsignedName = "$stem-unsigned.exe"
            $unsignedPath = Join-Path $dir $unsignedName
            Copy-Item -Path $path -Destination $unsignedPath -Force
            $path = $unsignedPath
            $name = $unsignedName
          }

          $releaseName = $name -replace '^Relay Agent-', 'Relay.Agent-'
          if ($releaseName -ne $name) {
            $dir = Split-Path -Parent $path
            $releasePath = Join-Path $dir $releaseName
            Copy-Item -LiteralPath $path -Destination $releasePath -Force
            $path = $releasePath
            $name = $releaseName
          }

          "path=$path" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "name=$name" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Collect installer digest
        id: installer_digest
        shell: pwsh
        run: |
          $hash = Get-FileHash "${{ steps.release_asset.outputs.path }}" -Algorithm SHA256
          "sha256=$($hash.Hash.ToLowerInvariant())" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Validate release artifact manifest gate
        id: release_manifest
        shell: pwsh
        env:
          RELEASE_TAG: ${{ steps.release_meta.outputs.tag }}
          RELEASE_NAME: ${{ steps.release_meta.outputs.release_name }}
          INSTALLER_PATH: ${{ steps.release_asset.outputs.path }}
          INSTALLER_NAME: ${{ steps.release_asset.outputs.name }}
          INSTALLER_SHA256: ${{ steps.installer_digest.outputs.sha256 }}
          SIGNING_MODE: ${{ steps.signing_mode.outputs.mode }}
          SIGNING_ENABLED: ${{ steps.signing_mode.outputs.enabled }}
          TRUSTED_AUTHENTICODE_STATUS: ${{ steps.signature.outputs.status }}
          TRUSTED_SIGNER_SUBJECT: ${{ steps.signature.outputs.subject }}
          TRUSTED_SIGNER_THUMBPRINT: ${{ steps.signature.outputs.thumbprint }}
          SELF_SIGNED_AUTHENTICODE_STATUS: ${{ steps.self_signed.outputs.status }}
          SELF_SIGNED_SIGNER_SUBJECT: ${{ steps.self_signed.outputs.subject }}
          SELF_SIGNED_SIGNER_THUMBPRINT: ${{ steps.self_signed.outputs.thumbprint }}
        run: |
          $ErrorActionPreference = "Stop"

          function Assert-Equal($actual, $expected, $message) {
            if ($actual -ne $expected) {
              throw "$message Expected '$expected', got '$actual'."
            }
          }

          $relayManifestPath = Join-Path $env:GITHUB_WORKSPACE "apps\desktop\src-tauri\bootstrap\aionui-relay.json"
          $relayManifest = Get-Content -LiteralPath $relayManifestPath -Raw | ConvertFrom-Json
          $releaseSpec = $relayManifest.releaseArtifactManifest
          if (-not $releaseSpec) {
            throw "aionui-relay.json does not define releaseArtifactManifest."
          }

          Assert-Equal $releaseSpec.schema "RelayAionUiReleaseArtifactManifest.v1" "Unexpected release artifact manifest schema."
          Assert-Equal $releaseSpec.workflow ".github/workflows/release-aionui-windows-installer.yml" "Unexpected release workflow path."
          Assert-Equal $env:AIONUI_TAG $relayManifest.upstreams.aionUi.tag "AionUi tag drifted from the Relay manifest."
          Assert-Equal $env:AIONUI_COMMIT $relayManifest.upstreams.aionUi.commit "AionUi commit drifted from the Relay manifest."

          if (-not (Test-Path -LiteralPath $env:INSTALLER_PATH)) {
            throw "Release installer asset does not exist at $env:INSTALLER_PATH."
          }
          if ($env:INSTALLER_NAME -notmatch '^Relay\.Agent-.+-win-x64(?:-(?:unsigned|selfsigned))?\.exe$') {
            throw "Installer asset name does not match the Relay-branded Windows x64 pattern: $env:INSTALLER_NAME"
          }
          if ($env:INSTALLER_SHA256 -notmatch '^[a-f0-9]{64}$') {
            throw "Installer SHA256 is not a lowercase 64-character hex digest: $env:INSTALLER_SHA256"
          }

          $allowedSigningModes = @($releaseSpec.allowedSigningModes)
          if ($allowedSigningModes -notcontains $env:SIGNING_MODE) {
            throw "Signing mode '$env:SIGNING_MODE' is not allowed by releaseArtifactManifest."
          }

          $isPrerelease = $env:RELEASE_TAG.Contains("-")
          if (-not $isPrerelease -and $env:SIGNING_MODE -ne $releaseSpec.formalReleaseSigningMode) {
            throw "Formal release '$env:RELEASE_TAG' must use signing mode '$($releaseSpec.formalReleaseSigningMode)', got '$env:SIGNING_MODE'."
          }
          if ($isPrerelease -and (@($releaseSpec.prereleaseSigningModes) -notcontains $env:SIGNING_MODE)) {
            throw "Prerelease '$env:RELEASE_TAG' uses unsupported signing mode '$env:SIGNING_MODE'."
          }

          $authenticodeStatus = "not checked (unsigned prerelease)"
          $signerSubject = ""
          $signerThumbprint = ""
          if ($env:SIGNING_MODE -eq "trusted-signing") {
            $authenticodeStatus = $env:TRUSTED_AUTHENTICODE_STATUS
            $signerSubject = $env:TRUSTED_SIGNER_SUBJECT
            $signerThumbprint = $env:TRUSTED_SIGNER_THUMBPRINT
            Assert-Equal $authenticodeStatus "Valid" "Trusted Signing did not produce a valid Authenticode signature."
          } elseif ($env:SIGNING_MODE -eq "self-signed-prerelease") {
            $authenticodeStatus = $env:SELF_SIGNED_AUTHENTICODE_STATUS
            $signerSubject = $env:SELF_SIGNED_SIGNER_SUBJECT
            $signerThumbprint = $env:SELF_SIGNED_SIGNER_THUMBPRINT
            if ([string]::IsNullOrWhiteSpace($signerThumbprint)) {
              throw "Self-signed prerelease did not report a signer thumbprint."
            }
          } elseif (-not $isPrerelease) {
            throw "Unsigned installer assets are only allowed for prerelease tags."
          }

          $package = Get-Content -LiteralPath "aionui\package.json" -Raw | ConvertFrom-Json
          Assert-Equal $package.name $relayManifest.branding.packageName "Relay overlay package name is not reflected in AionUi."
          Assert-Equal $package.productName $relayManifest.branding.productName "Relay overlay productName is not reflected in AionUi."

          $builderConfig = Get-Content -LiteralPath "aionui\electron-builder.yml" -Raw
          if ($builderConfig -notmatch "(?m)^productName:\s+Relay Agent$" -or $builderConfig -notmatch "(?m)^executableName:\s+Relay Agent$") {
            throw "Relay overlay branding is missing from electron-builder.yml."
          }
          if ($builderConfig -notmatch "resources/relay-gateway" -or $builderConfig -notmatch "resources/relay-tools") {
            throw "Relay gateway or portable tool resources are missing from electron-builder.yml."
          }

          if ([string]::IsNullOrWhiteSpace($relayManifest.workspaceSearch.highLevelTool.resultFlowContract)) {
            throw "Workspace Document Search result-flow contract is missing from the Relay manifest."
          }

          $bundledPayloads = @()
          foreach ($payload in @($releaseSpec.requiredBundledPayloads)) {
            $payloadPath = Join-Path "aionui" ($payload.installedPath -replace '/', '\')
            if (-not (Test-Path -LiteralPath $payloadPath)) {
              throw "Required bundled payload '$($payload.id)' is missing at $payloadPath."
            }
            $bundledPayloads += [ordered]@{
              id = $payload.id
              installedPath = $payload.installedPath
              requiredFor = $payload.requiredFor
              present = $true
            }
          }

          $artifactManifest = [ordered]@{
            schema = $releaseSpec.schema
            selectedTrack = $relayManifest.selectedTrack
            release = [ordered]@{
              tag = $env:RELEASE_TAG
              name = $env:RELEASE_NAME
              prerelease = $isPrerelease
              workflow = $releaseSpec.workflow
              runId = $env:GITHUB_RUN_ID
              runAttempt = $env:GITHUB_RUN_ATTEMPT
              sourceSha = $env:GITHUB_SHA
            }
            installer = [ordered]@{
              assetName = $env:INSTALLER_NAME
              sha256 = $env:INSTALLER_SHA256
              pattern = $releaseSpec.primaryArtifactPattern
            }
            signing = [ordered]@{
              mode = $env:SIGNING_MODE
              enabled = $env:SIGNING_ENABLED -eq "true"
              authenticodeStatus = $authenticodeStatus
              signerSubject = $signerSubject
              signerThumbprint = $signerThumbprint
            }
            upstreams = [ordered]@{
              aionUi = [ordered]@{
                repository = $relayManifest.upstreams.aionUi.repository
                tag = $relayManifest.upstreams.aionUi.tag
                commit = $relayManifest.upstreams.aionUi.commit
                license = $relayManifest.upstreams.aionUi.license
              }
              officeCli = [ordered]@{
                repository = $relayManifest.upstreams.officeCli.repository
                version = $relayManifest.upstreams.officeCli.version
                tag = $relayManifest.upstreams.officeCli.tag
                commit = $relayManifest.upstreams.officeCli.commit
                license = $relayManifest.upstreams.officeCli.license
              }
            }
            overlay = [ordered]@{
              version = $releaseSpec.overlayVersion
              packageName = $relayManifest.branding.packageName
              productName = $relayManifest.branding.productName
              executableName = $relayManifest.branding.executableName
              protocol = $relayManifest.branding.protocol
              installerArtifactPrefix = $relayManifest.branding.installerArtifactPrefix
              providerDisplayModelRef = $relayManifest.providerSeed.displayModelRef
              resultFlowContract = $relayManifest.workspaceSearch.highLevelTool.resultFlowContract
              requiredAssertions = @($releaseSpec.requiredOverlayAssertions)
            }
            bundledPayloads = $bundledPayloads
            evidenceBundleRow = $releaseSpec.evidenceBundleRow
            gate = [ordered]@{
              task = "AION02"
              status = "release-workflow-artifact-manifest-verified"
              requiredMetadata = @($releaseSpec.requiredReleaseMetadata)
            }
          }

          $releaseManifestPath = Join-Path $env:RUNNER_TEMP $releaseSpec.manifestAssetName
          $artifactManifest | ConvertTo-Json -Depth 20 | Set-Content -LiteralPath $releaseManifestPath -Encoding UTF8

          "path=$releaseManifestPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "name=$($releaseSpec.manifestAssetName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "schema=$($releaseSpec.schema)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "overlay_version=$($releaseSpec.overlayVersion)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Publish installer to GitHub Releases
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release_meta.outputs.tag }}
          RELEASE_NAME: ${{ steps.release_meta.outputs.release_name }}
          RELEASE_PRERELEASE: ${{ contains(steps.release_meta.outputs.tag, '-') }}
          INSTALLER_PATH: ${{ steps.release_asset.outputs.path }}
          INSTALLER_SHA256: ${{ steps.installer_digest.outputs.sha256 }}
          SIGNING_MODE: ${{ steps.signing_mode.outputs.mode }}
          SELF_SIGNED_CERT_PATH: ${{ steps.self_signed.outputs.cert_path }}
          RELEASE_MANIFEST_PATH: ${{ steps.release_manifest.outputs.path }}
          RELEASE_MANIFEST_NAME: ${{ steps.release_manifest.outputs.name }}
          RELEASE_MANIFEST_SCHEMA: ${{ steps.release_manifest.outputs.schema }}
          RELAY_OVERLAY_VERSION: ${{ steps.release_manifest.outputs.overlay_version }}
        run: |
          $assets = @($env:INSTALLER_PATH, $env:RELEASE_MANIFEST_PATH)
          $releaseNotes = @"
          Relay-branded AionUi Windows NSIS installer for Relay Agent.

          - AionUi baseline: $env:AIONUI_TAG / $env:AIONUI_COMMIT
          - Overlay version: $env:RELAY_OVERLAY_VERSION
          - Overlay contents: Relay provider seed, Relay branding, relay-agent protocol, Relay icons
          - Installer SHA256: $env:INSTALLER_SHA256
          - Release manifest: $env:RELEASE_MANIFEST_NAME ($env:RELEASE_MANIFEST_SCHEMA)

          Download the attached installer asset to install or upgrade Relay Agent on Windows 10/11 x64.
          "@

          if ($env:SIGNING_MODE -eq "self-signed-prerelease") {
            $releaseNotes += @"

          Internal prerelease note: this installer is self-signed for smoke testing only. It does not provide public publisher trust or SmartScreen reputation.
          "@
          }

          if ($env:SIGNING_MODE -eq "self-signed-prerelease" -and -not [string]::IsNullOrWhiteSpace($env:SELF_SIGNED_CERT_PATH)) {
            $assets += $env:SELF_SIGNED_CERT_PATH
          }

          gh release view $env:RELEASE_TAG *> $null
          $releaseExists = $LASTEXITCODE -eq 0

          if ($releaseExists) {
            gh release upload $env:RELEASE_TAG @assets --clobber
            gh release edit $env:RELEASE_TAG --title $env:RELEASE_NAME --notes $releaseNotes
          } else {
            $args = @(
              "release",
              "create",
              $env:RELEASE_TAG,
              "--target",
              $env:GITHUB_SHA,
              "--title",
              $env:RELEASE_NAME,
              "--notes",
              $releaseNotes
            )
            if ($env:RELEASE_PRERELEASE -eq "true") {
              $args += "--prerelease"
            }
            $args += $assets
            gh @args
          }

      - name: Summarize release publication
        shell: bash
        run: |
          {
            echo "### Relay-branded AionUi Windows release"
            echo "- Release tag: \`${{ steps.release_meta.outputs.tag }}\`"
            echo "- Release name: \`${{ steps.release_meta.outputs.release_name }}\`"
            echo "- AionUi baseline: \`${{ env.AIONUI_TAG }} / ${{ env.AIONUI_COMMIT }}\`"
            echo "- Installer asset: \`${{ steps.release_asset.outputs.name }}\`"
            echo "- Installer SHA256: \`${{ steps.installer_digest.outputs.sha256 }}\`"
            echo "- Release manifest: \`${{ steps.release_manifest.outputs.name }}\`"
            echo "- Manifest schema: \`${{ steps.release_manifest.outputs.schema }}\`"
            echo "- Overlay version: \`${{ steps.release_manifest.outputs.overlay_version }}\`"
            echo "- Signing mode: \`${{ steps.signing_mode.outputs.mode }}\`"
            if [ "${{ steps.signing_mode.outputs.enabled }}" = "true" ]; then
              echo "- Authenticode status: \`${{ steps.signature.outputs.status }}\`"
              echo "- Signer: \`${{ steps.signature.outputs.subject }}\`"
              echo "- Thumbprint: \`${{ steps.signature.outputs.thumbprint }}\`"
            elif [ "${{ steps.signing_mode.outputs.mode }}" = "self-signed-prerelease" ]; then
              echo "- Authenticode status: \`${{ steps.self_signed.outputs.status }}\`"
              echo "- Signer: \`${{ steps.self_signed.outputs.subject }}\`"
              echo "- Thumbprint: \`${{ steps.self_signed.outputs.thumbprint }}\`"
              echo "- Test certificate asset: \`${{ steps.self_signed.outputs.cert_name }}\`"
            else
              echo "- Authenticode status: \`not checked (unsigned prerelease)\`"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
