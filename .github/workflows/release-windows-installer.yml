name: release-relay-sidecar

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to publish, for example v0.3.2"
        required: true
        type: string
      release_name:
        description: "Optional GitHub Release name override"
        required: false
        type: string

jobs:
  publish-windows-installer:
    name: Publish Windows portable package and installer
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install pnpm
        shell: bash
        run: |
          corepack enable
          corepack prepare pnpm@10.33.0 --activate

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Install NSIS
        shell: pwsh
        run: choco install nsis ripgrep -y --no-progress

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve release metadata
        id: release_meta
        shell: bash
        run: |
          tag="${{ inputs.release_tag }}"
          release_name="${{ inputs.release_name }}"
          version="$(node -p "require('./apps/workbench/package.json').version")"
          if [[ "$tag" != "v${version}" && "$tag" != v${version}-* ]]; then
            echo "Release tag '$tag' must match Relay version '$version'." >&2
            exit 1
          fi
          if [ -z "$release_name" ]; then
            release_name="Relay Agent ${tag}"
          fi
          printf 'tag=%s\n' "$tag" >> "$GITHUB_OUTPUT"
          printf 'release_name=%s\n' "$release_name" >> "$GITHUB_OUTPUT"
          printf 'version=%s\n' "$version" >> "$GITHUB_OUTPUT"

      - name: Run active acceptance gate
        run: pnpm check

      - name: Publish Windows sidecar package
        run: pnpm sidecar:publish:windows

      - name: Create Windows portable zip
        run: pnpm sidecar:archive:windows

      - name: Build user-scope NSIS installer
        run: pnpm sidecar:installer:windows

      - name: Verify installer policy
        shell: pwsh
        run: |
          $script = Get-Content dist/installer/relay-agent-win-x64.nsi -Raw
          if ($script -notmatch 'RequestExecutionLevel user') { throw 'NSIS script must use user execution level' }
          if ($script -match 'RequestExecutionLevel admin') { throw 'NSIS script must not request admin execution level' }
          if ($script -match 'HKLM') { throw 'NSIS script must not write HKLM' }
          if ($script.Contains('$PROGRAMFILES')) { throw 'NSIS script must not install under Program Files' }
          if (!$script.Contains('$LOCALAPPDATA\Programs\Relay Agent')) { throw 'NSIS script must default to user-local install path' }

      - name: Collect release inventory
        run: pnpm release:inventory

      - name: Upload Windows release assets
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.release_meta.outputs.tag }}
          RELEASE_NAME: ${{ steps.release_meta.outputs.release_name }}
          VERSION: ${{ steps.release_meta.outputs.version }}
        run: |
          gh release view "$RELEASE_TAG" >/dev/null 2>&1 || \
            gh release create "$RELEASE_TAG" --title "$RELEASE_NAME" --notes "Relay Agent sidecar Workbench release."
          gh release upload "$RELEASE_TAG" "dist/relay-agent-${VERSION}-win-x64.zip" --clobber
          gh release upload "$RELEASE_TAG" "dist/installer/Relay.Agent-${VERSION}-win-x64-setup.exe" --clobber
          gh release upload "$RELEASE_TAG" "dist/release/relay-release-inventory.json" --clobber
          gh release upload "$RELEASE_TAG" "dist/release/relay-sbom.json" --clobber

  publish-linux-archive:
    name: Publish Linux archive
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install pnpm
        shell: bash
        run: |
          corepack enable
          corepack prepare pnpm@10.33.0 --activate

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Install archive tools
        run: sudo apt-get update && sudo apt-get install -y unzip ripgrep

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve release metadata
        id: release_meta
        shell: bash
        run: |
          tag="${{ inputs.release_tag }}"
          release_name="${{ inputs.release_name }}"
          version="$(node -p "require('./apps/workbench/package.json').version")"
          if [[ "$tag" != "v${version}" && "$tag" != v${version}-* ]]; then
            echo "Release tag '$tag' must match Relay version '$version'." >&2
            exit 1
          fi
          if [ -z "$release_name" ]; then
            release_name="Relay Agent ${tag}"
          fi
          printf 'tag=%s\n' "$tag" >> "$GITHUB_OUTPUT"
          printf 'release_name=%s\n' "$release_name" >> "$GITHUB_OUTPUT"
          printf 'version=%s\n' "$version" >> "$GITHUB_OUTPUT"

      - name: Run active acceptance gate
        run: pnpm check

      - name: Publish Linux sidecar package
        run: pnpm sidecar:publish:linux

      - name: Create Linux portable tar asset
        run: pnpm sidecar:archive:linux

      - name: Collect release inventory
        run: pnpm release:inventory

      - name: Upload Linux release asset
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.release_meta.outputs.tag }}
          RELEASE_NAME: ${{ steps.release_meta.outputs.release_name }}
          VERSION: ${{ steps.release_meta.outputs.version }}
        run: |
          gh release view "$RELEASE_TAG" >/dev/null 2>&1 || \
            gh release create "$RELEASE_TAG" --title "$RELEASE_NAME" --notes "Relay Agent sidecar Workbench release."
          gh release upload "$RELEASE_TAG" "dist/relay-agent-${VERSION}-linux-x64.tar.gz" --clobber
