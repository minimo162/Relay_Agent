name: release-windows-installer

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to publish, for example v0.1.0"
        required: true
        type: string
      release_name:
        description: "Optional GitHub Release name override"
        required: false
        type: string

jobs:
  publish-windows-installer:
    runs-on: windows-latest
    permissions:
      contents: write
      id-token: write
    env:
      AZURE_CODESIGN_ENDPOINT: ${{ vars.AZURE_CODESIGN_ENDPOINT }}
      AZURE_CODESIGN_ACCOUNT_NAME: ${{ vars.AZURE_CODESIGN_ACCOUNT_NAME }}
      AZURE_CODESIGN_CERT_PROFILE_NAME: ${{ vars.AZURE_CODESIGN_CERT_PROFILE_NAME }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install pnpm
        shell: bash
        run: |
          corepack enable
          corepack prepare pnpm@10.33.0 --activate

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Resolve release metadata
        id: release_meta
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.release_tag }}"
            release_name="${{ inputs.release_name }}"
          else
            tag="${{ github.ref_name }}"
            release_name=""
          fi

          if [ -z "$tag" ]; then
            echo "Release tag is required." >&2
            exit 1
          fi

          if [ -z "$release_name" ]; then
            release_name="Relay Agent ${tag}"
          fi

          printf 'tag=%s\n' "$tag" >> "$GITHUB_OUTPUT"
          printf 'release_name=%s\n' "$release_name" >> "$GITHUB_OUTPUT"

      - name: Resolve Trusted Signing mode
        id: signing_mode
        shell: bash
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          required=(
            AZURE_CLIENT_ID
            AZURE_TENANT_ID
            AZURE_SUBSCRIPTION_ID
            AZURE_CODESIGN_ENDPOINT
            AZURE_CODESIGN_ACCOUNT_NAME
            AZURE_CODESIGN_CERT_PROFILE_NAME
          )

          missing=()
          present=0

          for var_name in "${required[@]}"; do
            if [ -n "${!var_name:-}" ]; then
              present=$((present + 1))
            else
              missing+=("$var_name")
            fi
          done

          if [ "$present" -eq 0 ]; then
            if [ "${{ github.event_name }}" != "workflow_dispatch" ] || [[ "${{ steps.release_meta.outputs.tag }}" != *-* ]]; then
              echo "Trusted Signing is required for formal v* releases. Use a prerelease tag via workflow_dispatch for unsigned internal builds." >&2
              exit 1
            fi
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "mode=unsigned-prerelease" >> "$GITHUB_OUTPUT"
            echo "summary=Trusted Signing is not configured; this workflow_dispatch prerelease will publish an unsigned installer asset marked as unsigned." >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'Trusted Signing configuration is partial. Missing: %s\n' "${missing[*]}" >&2
            exit 1
          fi

          echo "enabled=true" >> "$GITHUB_OUTPUT"
          echo "mode=trusted-signing" >> "$GITHUB_OUTPUT"
          echo "summary=Trusted Signing is configured, so the workflow will sign the installer before upload." >> "$GITHUB_OUTPUT"

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Guard pnpm lockfile policy
        shell: bash
        run: |
          test -f pnpm-lock.yaml
          test ! -f package-lock.json

      - name: Run workspace typecheck
        run: pnpm typecheck

      - name: Prepare Tauri bundle prerequisites
        working-directory: apps/desktop
        run: pnpm run prep:tauri-bundle

      - name: Run Rust workspace tests
        run: cargo test --manifest-path apps/desktop/src-tauri/Cargo.toml --workspace --exclude relay-agent-desktop

      - name: Run doctor CLI tests
        run: cargo test --manifest-path apps/desktop/src-tauri/Cargo.toml --test doctor_cli

      - name: Build Windows installer
        shell: bash
        run: pnpm --dir apps/desktop exec tauri build --config src-tauri/tauri.windows.conf.json

      - name: Locate installer artifact
        id: installer
        shell: pwsh
        run: |
          $installerDir = Join-Path $env:GITHUB_WORKSPACE "target\release\bundle\nsis"
          if (-not (Test-Path $installerDir)) {
            throw "NSIS bundle directory was not created: $installerDir"
          }

          $installer = Get-ChildItem -Path $installerDir -Filter "*.exe" -File |
            Sort-Object LastWriteTimeUtc -Descending |
            Select-Object -First 1

          if (-not $installer) {
            throw "No NSIS installer `.exe` was found in $installerDir"
          }

          "path=$($installer.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "name=$($installer.Name)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Azure login for Trusted Signing
        if: steps.signing_mode.outputs.enabled == 'true'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Sign installer with Trusted Signing
        if: steps.signing_mode.outputs.enabled == 'true'
        uses: azure/artifact-signing-action@v1
        with:
          endpoint: ${{ vars.AZURE_CODESIGN_ENDPOINT }}
          signing-account-name: ${{ vars.AZURE_CODESIGN_ACCOUNT_NAME }}
          certificate-profile-name: ${{ vars.AZURE_CODESIGN_CERT_PROFILE_NAME }}
          files: ${{ steps.installer.outputs.path }}
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256
          description: Relay Agent Windows installer
          description-url: https://github.com/${{ github.repository }}

      - name: Verify Authenticode signature
        if: steps.signing_mode.outputs.enabled == 'true'
        id: signature
        shell: pwsh
        run: |
          $signature = Get-AuthenticodeSignature "${{ steps.installer.outputs.path }}"
          if ($signature.Status -ne "Valid") {
            throw "Expected a valid Authenticode signature, got '$($signature.Status)'."
          }

          "status=$($signature.Status)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "subject=$($signature.SignerCertificate.Subject)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "thumbprint=$($signature.SignerCertificate.Thumbprint)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Prepare release asset
        id: release_asset
        shell: pwsh
        run: |
          $path = "${{ steps.installer.outputs.path }}"
          $name = "${{ steps.installer.outputs.name }}"

          if ("${{ steps.signing_mode.outputs.enabled }}" -ne "true") {
            $dir = Split-Path -Parent $path
            $stem = [System.IO.Path]::GetFileNameWithoutExtension($name)
            $unsignedName = "$stem-unsigned.exe"
            $unsignedPath = Join-Path $dir $unsignedName
            Copy-Item -Path $path -Destination $unsignedPath -Force
            $path = $unsignedPath
            $name = $unsignedName
          }

          "path=$path" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "name=$name" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Collect installer digest
        id: installer_digest
        shell: pwsh
        run: |
          $hash = Get-FileHash "${{ steps.release_asset.outputs.path }}" -Algorithm SHA256
          "sha256=$($hash.Hash.ToLowerInvariant())" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Publish installer to GitHub Releases
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.release_meta.outputs.tag }}
          RELEASE_NAME: ${{ steps.release_meta.outputs.release_name }}
          RELEASE_PRERELEASE: ${{ contains(steps.release_meta.outputs.tag, '-') }}
          INSTALLER_PATH: ${{ steps.release_asset.outputs.path }}
          SIGNING_MODE: ${{ steps.signing_mode.outputs.mode }}
        run: |
          $releaseNotes = @"
          Windows NSIS installer for Relay Agent.

          Signing mode: $env:SIGNING_MODE

          Download the attached installer asset to install or upgrade Relay Agent on Windows 10/11 x64.
          "@

          gh release view $env:RELEASE_TAG *> $null
          $releaseExists = $LASTEXITCODE -eq 0

          if ($releaseExists) {
            gh release upload $env:RELEASE_TAG $env:INSTALLER_PATH --clobber
            if ($LASTEXITCODE -ne 0) {
              exit $LASTEXITCODE
            }
          } else {
            $args = @(
              "release",
              "create",
              $env:RELEASE_TAG,
              $env:INSTALLER_PATH,
              "--title",
              $env:RELEASE_NAME,
              "--notes",
              $releaseNotes
            )
            if ($env:RELEASE_PRERELEASE -eq "true") {
              $args += "--prerelease"
            }

            gh @args
            if ($LASTEXITCODE -ne 0) {
              exit $LASTEXITCODE
            }
          }

      - name: Summarize release publication
        shell: bash
        run: |
          {
            echo "## Windows Installer Release"
            echo ""
            echo "- Release tag: \`${{ steps.release_meta.outputs.tag }}\`"
            echo "- Release name: \`${{ steps.release_meta.outputs.release_name }}\`"
            echo "- Bundle target: \`nsis\`"
            echo "- Installer asset: \`${{ steps.release_asset.outputs.name }}\`"
            echo "- Installer SHA256: \`${{ steps.installer_digest.outputs.sha256 }}\`"
            echo "- Signing mode: \`${{ steps.signing_mode.outputs.mode }}\`"
            echo "- Signing summary: ${{ steps.signing_mode.outputs.summary }}"
            if [ "${{ steps.signing_mode.outputs.enabled }}" = "true" ]; then
              echo "- Authenticode status: \`${{ steps.signature.outputs.status }}\`"
              echo "- Authenticode subject: \`${{ steps.signature.outputs.subject }}\`"
            else
              echo "- Authenticode status: \`not checked (unsigned prerelease)\`"
            fi
            echo "- Repo setup guide: \`docs/TRUSTED_SIGNING_SETUP.md\`"
          } >> "$GITHUB_STEP_SUMMARY"
