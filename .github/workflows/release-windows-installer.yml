name: release-windows-installer

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to publish, for example v0.1.0"
        required: true
        type: string
      release_name:
        description: "Optional GitHub Release name override"
        required: false
        type: string

jobs:
  publish-windows-installer:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Resolve release metadata
        id: release_meta
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.release_tag }}"
            release_name="${{ inputs.release_name }}"
          else
            tag="${{ github.ref_name }}"
            release_name=""
          fi

          if [ -z "$tag" ]; then
            echo "Release tag is required." >&2
            exit 1
          fi

          if [ -z "$release_name" ]; then
            release_name="Relay Agent ${tag}"
          fi

          printf 'tag=%s\n' "$tag" >> "$GITHUB_OUTPUT"
          printf 'release_name=%s\n' "$release_name" >> "$GITHUB_OUTPUT"

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Run workspace typecheck
        run: pnpm typecheck

      - name: Run desktop Rust tests
        run: cargo test --manifest-path apps/desktop/src-tauri/Cargo.toml

      - name: Build Windows installer and upload to GitHub Releases
        uses: tauri-apps/tauri-action@action-v0.6.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop
          tauriScript: pnpm tauri
          tagName: ${{ steps.release_meta.outputs.tag }}
          releaseName: ${{ steps.release_meta.outputs.release_name }}
          releaseBody: |
            Windows NSIS installer for Relay Agent.

            Download the attached installer asset to install or upgrade Relay Agent on Windows 10/11 x64.
          releaseCommitish: ${{ github.sha }}
          generateReleaseNotes: true
          releaseDraft: false
          prerelease: ${{ contains(steps.release_meta.outputs.tag, '-') }}
          uploadUpdaterJson: false
          releaseAssetNamePattern: "relay-agent_[version]_windows_[arch][setup][ext]"

      - name: Summarize release publication
        shell: bash
        run: |
          {
            echo "## Windows Installer Release"
            echo ""
            echo "- Release tag: \`${{ steps.release_meta.outputs.tag }}\`"
            echo "- Release name: \`${{ steps.release_meta.outputs.release_name }}\`"
            echo "- Bundle target: \`nsis\`"
            echo "- Project path: \`apps/desktop\`"
          } >> "$GITHUB_STEP_SUMMARY"
