name: release-relay-sidecar

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to publish, for example v0.3.0"
        required: true
        type: string
      release_name:
        description: "Optional GitHub Release name override"
        required: false
        type: string

jobs:
  publish:
    name: Publish ${{ matrix.rid }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: win-x64
            os: windows-latest
            archive: zip
          - rid: linux-x64
            os: ubuntu-latest
            archive: tar

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install pnpm
        shell: bash
        run: |
          corepack enable
          corepack prepare pnpm@10.33.0 --activate

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Install ripgrep on Linux
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Install ripgrep on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: choco install ripgrep -y --no-progress

      - name: Resolve release metadata
        id: release_meta
        shell: bash
        run: |
          tag="${{ inputs.release_tag }}"
          release_name="${{ inputs.release_name }}"
          version="$(node -p "require('./apps/workbench/package.json').version")"
          if [[ "$tag" != "v${version}" && "$tag" != v${version}-* ]]; then
            echo "Release tag '$tag' must match Relay version '$version'." >&2
            exit 1
          fi
          if [ -z "$release_name" ]; then
            release_name="Relay Agent ${tag}"
          fi
          printf 'tag=%s\n' "$tag" >> "$GITHUB_OUTPUT"
          printf 'release_name=%s\n' "$release_name" >> "$GITHUB_OUTPUT"

      - name: Run active acceptance gate
        run: pnpm check

      - name: Publish sidecar
        shell: bash
        run: |
          dotnet publish apps/sidecar/Relay.Sidecar.csproj \
            --configuration Release \
            --runtime "${{ matrix.rid }}" \
            --self-contained true \
            --output "dist/relay-agent-${{ matrix.rid }}"
          pnpm release:inventory

      - name: Create zip asset
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          Compress-Archive -Path "dist/relay-agent-${{ matrix.rid }}/*" -DestinationPath "dist/relay-agent-${{ matrix.rid }}.zip" -Force

      - name: Create tar asset
        if: matrix.archive == 'tar'
        shell: bash
        run: |
          tar -C "dist/relay-agent-${{ matrix.rid }}" -czf "dist/relay-agent-${{ matrix.rid }}.tar.gz" .

      - name: Upload release assets
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.release_meta.outputs.tag }}
          RELEASE_NAME: ${{ steps.release_meta.outputs.release_name }}
        run: |
          gh release view "$RELEASE_TAG" >/dev/null 2>&1 || \
            gh release create "$RELEASE_TAG" --title "$RELEASE_NAME" --notes "Relay Agent sidecar workbench release."
          if [ "${{ matrix.archive }}" = "zip" ]; then
            gh release upload "$RELEASE_TAG" "dist/relay-agent-${{ matrix.rid }}.zip" --clobber
          else
            gh release upload "$RELEASE_TAG" "dist/relay-agent-${{ matrix.rid }}.tar.gz" --clobber
          fi
          gh release upload "$RELEASE_TAG" "dist/release/relay-release-inventory.json" --clobber
          gh release upload "$RELEASE_TAG" "dist/release/relay-sbom.json" --clobber
