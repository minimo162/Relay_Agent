name: ci

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  checks:
    name: Hard Cutover Acceptance
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install pnpm
        shell: bash
        run: |
          corepack enable
          corepack prepare pnpm@10.33.0 --activate

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Guard pnpm lockfile policy
        shell: bash
        run: |
          test -f pnpm-lock.yaml
          test ! -f package-lock.json

      - name: Check hard cutover path
        run: node scripts/check-hard-cut-guard.mjs

      - name: Build active workbench and sidecar
        run: pnpm check
