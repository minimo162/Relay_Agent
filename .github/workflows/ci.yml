name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    name: CI Checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.33.0 --activate

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: cargo check
        run: cargo check

      - name: cargo clippy
        run: cargo clippy --allow-dirty

      - name: pnpm typecheck
        run: pnpm typecheck
