name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    name: CI Checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.33.0 --activate

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: cargo check
        run: cargo check

      - name: cargo clippy
        run: cargo clippy --allow-dirty

      - name: pnpm typecheck
        run: pnpm typecheck
