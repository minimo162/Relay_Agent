name: ci

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  checks:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Ubuntu Acceptance
            os: ubuntu-latest
            run_launch_smokes: true
            run_windows_smoke: false
          - name: Windows Acceptance
            os: windows-latest
            run_launch_smokes: false
            run_windows_smoke: true

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        shell: bash
        run: |
          corepack enable
          corepack prepare pnpm@10.33.0 --activate

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Guard pnpm lockfile policy
        shell: bash
        run: |
          test -f pnpm-lock.yaml
          test ! -f package-lock.json

      - name: Fetch Tauri externalBin sidecars
        working-directory: apps/desktop
        run: |
          node ./scripts/fetch-bundled-node.mjs
          node ./scripts/fetch-bundled-ripgrep.mjs

      - name: Install LiteParse runner dependencies
        working-directory: apps/desktop
        run: npm ci --omit=dev --prefix ./src-tauri/liteparse-runner

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            wget \
            xvfb

      - name: Guard live docs against stale references
        if: runner.os == 'Linux'
        shell: bash
        run: |
          ! rg -n "packages/contracts|spreadsheet-centric demo|minimal CSV end-to-end demo" README.md PLANS.md AGENTS.md docs/CLAW_CODE_ALIGNMENT.md

      - name: cargo check
        run: cargo check --manifest-path apps/desktop/src-tauri/Cargo.toml

      - name: cargo test --workspace --exclude relay-agent-desktop
        run: cargo test --manifest-path apps/desktop/src-tauri/Cargo.toml --workspace --exclude relay-agent-desktop

      - name: cargo test --test doctor_cli
        run: cargo test --manifest-path apps/desktop/src-tauri/Cargo.toml --test doctor_cli

      - name: pnpm check
        run: pnpm check

      - name: pnpm launch:test
        if: matrix.run_launch_smokes
        run: pnpm launch:test

      - name: pnpm smoke:windows
        if: matrix.run_windows_smoke
        run: pnpm smoke:windows
